<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XI dos Sonhos · Role o Dado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d12; --panel:#13161f; --panel-2:#1a1e2b;
    --ink:#eef2ff; --muted:#8892ad;
    --line:rgba(255,255,255,.08);
    --gold:#f5c842; --gold-2:#ffd86b;
    --neon:#22d3ee; --neon-2:#7dd3fc;
    --pink:#ec4899; --red:#ef4444; --green:#22c55e;
    --grass:#0d3b22; --grass-2:#0a3119;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
  body{background:
      radial-gradient(900px 600px at 90% -10%, rgba(34,211,238,.10), transparent 60%),
      radial-gradient(700px 500px at -10% 110%, rgba(236,72,153,.10), transparent 60%),
      linear-gradient(180deg,#0b0d12,#0a0c11);}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid var(--line);background:rgba(11,13,18,.7);backdrop-filter:blur(8px);position:sticky;top:0;z-index:50}
  .brand{display:flex;align-items:center;gap:12px;font-family:'Anton';letter-spacing:2px;font-size:22px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .brand small{color:var(--muted);font-family:'VT323';letter-spacing:3px;font-size:13px;margin-left:6px}
  .stats{display:flex;gap:18px;align-items:center;font-size:12px;color:var(--muted);font-family:'VT323';letter-spacing:2px}
  .stats b{color:var(--gold);font-family:'Anton';font-size:22px;letter-spacing:1px;margin-right:6px}
  .btn-reset{background:transparent;border:1px solid var(--line);color:var(--muted);padding:7px 12px;font-size:11px;letter-spacing:2px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600;text-transform:uppercase;transition:.15s}
  .btn-reset:hover{border-color:var(--red);color:var(--red)}

  .game{display:grid;grid-template-columns:320px 1fr 340px;gap:24px;padding:24px 28px;max-width:1500px;margin:0 auto;align-items:start}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px}
  .panel h2{font-family:'Anton';font-size:22px;letter-spacing:1.5px;margin-bottom:6px}
  .panel .sub{color:var(--muted);font-size:13px;line-height:1.5;margin-bottom:18px}
  .step{display:flex;gap:12px;padding:10px 0;border-top:1px dashed var(--line);font-size:13px;color:#cbd5e1}
  .step:first-of-type{border-top:0}
  .step .n{width:24px;height:24px;border-radius:50%;background:var(--neon);color:#031620;font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .meter{margin-top:18px;height:8px;border-radius:99px;background:#0b1018;overflow:hidden;border:1px solid var(--line)}
  .meter>div{height:100%;background:linear-gradient(90deg,var(--neon),var(--gold));width:0%;transition:width .4s}
  .meter-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:2px;font-family:'VT323'}

  .field-wrap{position:relative;background:linear-gradient(180deg,#0f1320,#0a0d16);border:1px solid var(--line);border-radius:18px;padding:24px;min-height:680px}
  .field-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .field-head .title{font-family:'Anton';font-size:26px;letter-spacing:1.5px}
  .field-head .hint{color:var(--muted);font-size:12px;font-family:'VT323';letter-spacing:2px;text-transform:uppercase}
  .pitch{position:relative;width:100%;max-width:540px;aspect-ratio:3/4;margin:0 auto;border-radius:14px;border:2px solid rgba(34,211,238,.25);
    background:repeating-linear-gradient(0deg,var(--grass) 0 7%,var(--grass-2) 7% 14%);
    overflow:hidden;box-shadow:inset 0 0 80px rgba(0,0,0,.55), 0 30px 80px rgba(0,0,0,.5)}
  .pitch::before,.pitch::after{content:"";position:absolute;left:50%;transform:translateX(-50%);width:38%;height:16%;border:2px solid rgba(255,255,255,.18);pointer-events:none}
  .pitch .mid,.pitch .circle{pointer-events:none}
  .slot{z-index:5}
  .pitch::before{top:-2px;border-top:none}
  .pitch::after{bottom:-2px;border-bottom:none}
  .pitch .mid{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(255,255,255,.18)}
  .pitch .circle{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22%;aspect-ratio:1;border-radius:50%;border:2px solid rgba(255,255,255,.18)}

  .slot{position:absolute;transform:translate(-50%,-50%);width:90px;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;transition:.2s}
  .slot:hover{transform:translate(-50%,-50%) scale(1.06)}
  .slot .disc{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:22px;
    background:#0a141a;border:2px dashed rgba(255,255,255,.25);color:rgba(255,255,255,.4);transition:.2s;position:relative}
  .slot.filled .disc{background:linear-gradient(180deg,#0c2a1a,#072014);border:2px solid var(--gold);color:var(--gold);box-shadow:0 0 18px rgba(245,200,66,.35),inset 0 -8px 0 rgba(0,0,0,.25)}
  .slot .pos-tag{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.45);font-weight:700}
  .slot.filled .pos-tag{color:var(--neon-2)}
  .slot .label{font-size:11px;color:#fff;font-weight:700;text-shadow:0 1px 4px #000;text-align:center;max-width:100px;line-height:1.15}
  .slot.empty .label{color:rgba(255,255,255,.5);font-weight:600}
  .slot .team{font-family:'VT323';font-size:11px;color:var(--gold-2);letter-spacing:1px}

  .p1{left:50%;top:86%} .p2{left:14%;top:73%} .p3{left:36%;top:76%} .p4{left:64%;top:76%} .p5{left:86%;top:73%}
  .p6{left:25%;top:52%} .p7{left:50%;top:55%} .p8{left:75%;top:52%}
  .p9{left:18%;top:25%} .p10{left:50%;top:18%} .p11{left:82%;top:25%}

  .lineup-list{display:flex;flex-direction:column;gap:6px;margin-top:10px}
  .lineup-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;font-size:12px}
  .lineup-item.empty{opacity:.4}
  .lineup-item .pos-chip{width:28px;text-align:center;background:#0a1018;border-radius:5px;padding:2px 0;font-weight:800;font-size:10px;color:var(--neon);letter-spacing:1px}
  .lineup-item .nm{flex:1;font-weight:700}
  .lineup-item .tm{color:var(--muted);font-family:'VT323';letter-spacing:1px;font-size:11px}
  .sim-btn{width:100%;margin-top:16px;background:linear-gradient(180deg,var(--gold),var(--gold-2));color:#1a1206;border:none;padding:14px;font-weight:800;font-size:13px;letter-spacing:3px;cursor:pointer;border-radius:10px;font-family:inherit;text-transform:uppercase;transition:.2s;box-shadow:0 8px 24px rgba(245,200,66,.25)}
  .sim-btn:hover:not(:disabled){transform:translateY(-2px)}
  .sim-btn:disabled{opacity:.35;cursor:not-allowed;background:#2a2f3d;color:#666;box-shadow:none}

  .modal-bg{position:fixed;inset:0;background:rgba(5,6,10,.85);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;animation:fade .2s}
  .modal-bg.open{display:flex}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal{background:linear-gradient(180deg,#161a26,#0e111a);border:1px solid var(--line);border-radius:18px;width:100%;max-width:560px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:pop .25s ease}
  @keyframes pop{from{transform:translateY(10px) scale(.98);opacity:0}to{transform:none;opacity:1}}
  .modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .modal-head .ttl{font-family:'Anton';font-size:22px;letter-spacing:1.5px}
  .modal-head .x{background:transparent;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;padding:0 6px}
  .modal-body{padding:24px 22px;overflow-y:auto;flex:1}
  .modal-body::-webkit-scrollbar{width:6px}
  .modal-body::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}

  .roll-stage{text-align:center;padding:20px 0 8px}
  .dice{width:140px;height:140px;margin:0 auto 20px;border-radius:22px;background:linear-gradient(180deg,#fff,#e9eef7);color:#0b0d12;display:flex;align-items:center;justify-content:center;font-size:88px;
    box-shadow:0 18px 40px rgba(0,0,0,.6),inset 0 -10px 0 rgba(0,0,0,.08);transition:transform .15s}
  .dice.rolling{animation:dice .08s infinite}
  @keyframes dice{0%{transform:rotate(-14deg) scale(1.05)}50%{transform:rotate(16deg) scale(.95)}100%{transform:rotate(-8deg) scale(1.02)}}
  .roll-btn{background:var(--neon);color:#031620;border:none;padding:14px 28px;font-weight:800;font-size:13px;letter-spacing:3px;cursor:pointer;border-radius:10px;font-family:inherit;text-transform:uppercase;transition:.2s}
  .roll-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(34,211,238,.3)}
  .roll-btn.alt{background:var(--panel-2);color:var(--muted);border:1px solid var(--line);margin-left:8px}

  .reveal-team{margin:20px 0 6px;padding:14px;border:1px dashed rgba(34,211,238,.4);border-radius:12px;background:rgba(34,211,238,.06);text-align:center;display:none}
  .reveal-team.shown{display:block;animation:pop .35s ease}
  .reveal-team .lab{font-family:'VT323';letter-spacing:3px;font-size:12px;color:var(--neon);text-transform:uppercase;margin-bottom:4px}
  .reveal-team .nm{font-family:'Anton';font-size:24px;letter-spacing:1px}
  .reveal-team .yr{color:var(--muted);font-size:12px;margin-top:2px}

  .player-list{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:10px}
  .pl{display:flex;align-items:center;gap:6px;padding:5px 7px;border:1px solid var(--line);border-radius:6px;background:var(--panel-2);cursor:pointer;transition:.12s;min-width:0}
  .pl:hover{border-color:var(--gold)}
  .pl .av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#243047,#101725);display:flex;align-items:center;justify-content:center;font-family:'Anton';font-size:10px;color:var(--gold);border:1px solid var(--line);flex-shrink:0}
  .pl .info{flex:1;min-width:0;overflow:hidden}
  .pl .nm{font-weight:700;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pl .mt{display:none}
  .pl .pl-pos{font-size:8px;padding:1px 4px;letter-spacing:.5px;flex-shrink:0}
  .pl .rt{font-family:'Anton';font-size:14px;color:var(--gold);letter-spacing:0;flex-shrink:0;min-width:18px;text-align:right}
  .pl .rt.hidden{font-family:'VT323';font-size:14px;color:var(--muted)}

  .match-overlay{position:fixed;inset:0;background:rgba(5,6,10,.95);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
  .match-overlay.open{display:flex}
  .match-box{background:linear-gradient(180deg,#0f1320,#0a0d16);border:1px solid var(--line);border-radius:18px;width:100%;max-width:720px;padding:30px;text-align:center}
  .match-teams{display:flex;justify-content:space-around;align-items:center;gap:18px}
  .match-teams .tn{font-family:'Anton';font-size:18px;letter-spacing:2px;color:var(--neon)}
  .match-teams .tn.foe{color:var(--red)}
  .match-teams .vs{color:var(--muted);font-family:'VT323';letter-spacing:4px}
  .match-score{font-family:'Anton';font-size:120px;line-height:1;display:flex;justify-content:center;align-items:center;gap:24px;margin:16px 0 8px}
  .match-score .s{color:var(--gold);text-shadow:0 0 20px rgba(245,200,66,.4)}
  .match-score .s.r{color:var(--red);text-shadow:0 0 20px rgba(239,68,68,.4)}
  .match-clock{font-family:'VT323';font-size:24px;color:var(--neon);letter-spacing:4px;margin-bottom:14px}
  .feed{text-align:left;max-height:220px;overflow-y:auto;display:flex;flex-direction:column;gap:5px;padding:6px}
  .feed::-webkit-scrollbar{width:6px}
  .feed::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  .ev{padding:8px 12px;background:rgba(255,255,255,.03);border-left:3px solid var(--line);border-radius:0 6px 6px 0;font-size:12.5px;color:#cbd5e1}
  .ev.goal{border-color:var(--green);color:#fff}
  .ev.goal strong{color:var(--green)}
  .ev.bad{border-color:var(--red);color:#ffd9dc}
  .ev.bad strong{color:var(--red)}
  .ev .mn{font-family:'VT323';color:var(--muted);margin-right:8px;letter-spacing:1px}
  .verdict{margin-top:20px;padding:18px;border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.02);display:none}
  .verdict.show{display:block;animation:pop .3s ease}
  .verdict h3{font-family:'Anton';font-size:30px;letter-spacing:1.5px;margin-bottom:6px}
  .verdict.win h3{color:var(--green)} .verdict.lose h3{color:var(--red)} .verdict.draw h3{color:var(--gold)}
  .verdict p{color:#cbd5e1;font-size:13px;margin-bottom:14px}
  .verdict .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
  .verdict button{background:var(--neon);color:#031620;border:none;padding:11px 18px;font-weight:800;font-size:12px;letter-spacing:2px;border-radius:8px;cursor:pointer;font-family:inherit;text-transform:uppercase}
  .verdict button.ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}

  .toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a1f2e;border:1px solid var(--line);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;z-index:300;animation:pop .25s}

  .mode-seg{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .mode-seg button{background:transparent;color:var(--muted);border:none;padding:6px 12px;font-size:11px;font-weight:700;letter-spacing:1.5px;cursor:pointer;font-family:inherit}
  .mode-seg button.active{background:var(--neon);color:#031620}

  .pl.locked{opacity:.45;cursor:not-allowed;background:#0d1019}
  .pl.locked:hover{transform:none;border-color:var(--line)}
  .pl .rt.hidden{color:var(--muted);font-family:'VT323';font-size:18px}
  .pl-pos{font-size:9px;padding:2px 6px;border-radius:99px;background:#0a1018;color:var(--neon);font-weight:800;letter-spacing:1px;border:1px solid var(--line)}
  .roster-head{font-family:'VT323';letter-spacing:3px;color:var(--muted);font-size:12px;text-transform:uppercase;margin:14px 0 6px;padding-top:10px;border-top:1px dashed var(--line)}
  .roster-head b{color:var(--neon)}

  .dice-panel{position:sticky;top:80px;max-height:calc(100vh - 100px);overflow-y:auto}
  .dice-panel::-webkit-scrollbar{width:6px}
  .dice-panel::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
  .dice-inline{width:110px;height:110px;margin:8px auto 14px;border-radius:18px;background:linear-gradient(180deg,#fff,#e9eef7);color:#0b0d12;display:flex;align-items:center;justify-content:center;font-size:70px;
    box-shadow:0 14px 32px rgba(0,0,0,.55),inset 0 -8px 0 rgba(0,0,0,.08);transition:transform .15s}
  .dice-inline.rolling{animation:dice .08s infinite}
  .roll-btn.full{width:100%;display:block}
  .mode-seg.full{width:100%;margin-bottom:12px}
  .mode-seg.full button{flex:1;padding:8px 4px;font-size:10px}
  .team-name-input{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:10px 12px;color:var(--gold);font-family:'Anton';font-size:18px;letter-spacing:1.5px;margin:8px 0 12px;text-transform:uppercase;outline:none;transition:.15s}
  .team-name-input:focus{border-color:var(--neon);background:#0d1018}
  .slot.filled .disc.col-team{background:var(--col1,#0c2a1a);border-color:var(--col2,var(--gold));color:var(--col-text,#fff);box-shadow:0 0 14px var(--col-glow,rgba(245,200,66,.3)),inset 0 -8px 0 rgba(0,0,0,.25)}

  @media (max-width:1100px){
    .game{grid-template-columns:1fr;padding:16px}
    .field-wrap{min-height:auto}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><div class="dot"></div> XI DOS SONHOS <small>· role o dado · monte sua escalação</small></div>
  <div class="stats">
    <div class="mode-seg" id="mode-seg">
      <button class="active" data-mode="classico">CLÁSSICO</button>
      <button data-mode="pro">PRO</button>
    </div>
    <div><b id="stat-filled">0</b>/11 escalados</div>
    <div><b id="stat-rolls">0</b>dados rolados</div>
    <button class="btn-reset" id="btn-reset">RECOMEÇAR</button>
  </div>
</header>

<main class="game">
  <aside class="panel dice-panel">
    <h2>DADO DO ELENCO</h2>
    <div class="mode-seg full" id="tipo-seg">
      <button class="active" data-tipo="todos">TODOS</button>
      <button data-tipo="selecao">SELEÇÕES</button>
      <button data-tipo="brasileiro">BRASILEIROS</button>
    </div>
    <div class="dice-inline" id="dice">🎲</div>
    <button class="roll-btn full" id="btn-roll">ROLAR O DADO</button>
    <div class="reveal-team" id="reveal">
      <div class="lab">ELENCO SORTEADO</div>
      <div class="nm" id="reveal-name">—</div>
      <div class="yr" id="reveal-year">—</div>
    </div>
    <div class="player-list" id="player-list"></div>
    <div class="meter"><div id="meter-fill"></div></div>
    <div class="meter-label"><span>PROGRESSO</span><span id="meter-pct">0%</span></div>
  </aside>

  <section class="field-wrap">
    <div class="field-head">
      <div class="title">CAMPO · 4-3-3</div>
      <div class="hint">Clique num disco preenchido pra remover</div>
    </div>
    <div class="pitch" id="pitch"><div class="mid"></div><div class="circle"></div></div>
  </section>

  <aside class="panel">
    <h2>SEU XI</h2>
    <input type="text" id="team-name" class="team-name-input" placeholder="Nome do seu time" maxlength="32" value="XI DOS SONHOS"/>
    <div class="lineup-list" id="lineup-list"></div>
    <button class="sim-btn" id="btn-sim" disabled>SIMULAR PARTIDA</button>
  </aside>
</main>


<div class="match-overlay" id="match">
  <div class="match-box">
    <div class="match-teams">
      <div><div class="tn" id="m-team-a">XI DOS SONHOS</div></div>
      <div class="vs">VS</div>
      <div><div class="tn foe" id="foe-name">ADVERSÁRIO</div></div>
    </div>
    <div class="match-score"><span class="s" id="sc-a">0</span><span style="color:var(--muted)">:</span><span class="s r" id="sc-b">0</span></div>
    <div class="match-clock" id="m-clock">00'</div>
    <div class="feed" id="feed"></div>
    <div class="verdict" id="verdict">
      <h3 id="v-title">—</h3>
      <p id="v-text">—</p>
      <div class="actions">
        <button id="btn-new-match">JOGAR NOVA PARTIDA</button>
        <button class="ghost" id="btn-keep">VOLTAR AO CAMPO</button>
        <button class="ghost" id="btn-restart">RECOMEÇAR TUDO</button>
      </div>
    </div>
  </div>
</div>

<script>
const TIMES = [
  // ===================== SELEÇÕES =====================
  { id:'br58', tipo:'selecao', nome:'Brasil 1958', era:'Copa do Mundo · Suécia', cores:['#fde047','#16a34a'], jogadores:[
    {n:'Gilmar',pos:'GOL',r:88},{n:'Bellini',pos:'DEF',r:87},{n:'Nilton Santos',pos:'DEF',r:91},{n:'Djalma Santos',pos:'DEF',r:89},{n:'Orlando',pos:'DEF',r:84},
    {n:'Didi',pos:'MEI',r:93},{n:'Zito',pos:'MEI',r:86},{n:'Zagallo',pos:'MEI',r:88},
    {n:'Garrincha',pos:'ATA',r:96},{n:'Pelé',pos:'ATA',r:96},{n:'Vavá',pos:'ATA',r:90}]},
  { id:'br62', tipo:'selecao', nome:'Brasil 1962', era:'Copa do Mundo · Chile', cores:['#fde047','#16a34a'], jogadores:[
    {n:'Gilmar',pos:'GOL',r:88},{n:'Mauro',pos:'DEF',r:89},{n:'Zózimo',pos:'DEF',r:84},{n:'N. Santos',pos:'DEF',r:91},{n:'D. Santos',pos:'DEF',r:89},
    {n:'Zito',pos:'MEI',r:88},{n:'Didi',pos:'MEI',r:93},{n:'Zagallo',pos:'MEI',r:88},

      const [c1,c2] = p.cores;
      const textCol = isLight(c1)?'#0b0d12':'#fff';
      discStyle = `--col1:${c1};--col2:${c2};--col-text:${textCol};--col-glow:${hexToRgba(c2,.4)}`;
      discCls='col-team';
    }
    el.innerHTML = `
      <div class="disc ${discCls}" style="${discStyle}">${p?s.num:'?'}</div>
      <div class="pos-tag">${s.pos}</div>
      <div class="label">${p?p.n:s.label}</div>
      ${p?`<div class="team">${p.teamShort}</div>`:''}`;
    el.onclick = ()=>{
      if(state.lineup[s.idx]){
        if(confirm('Remover '+state.lineup[s.idx].n+' do XI?')){
          state.lineup[s.idx]=null; renderPitch();
        }
      }
    };
    pitch.appendChild(el);
  });
  renderLineup();
  updateStats();
}
function renderLineup(){
  $('#lineup-list').innerHTML = SLOTS.map(s=>{
    const p = state.lineup[s.idx];
    return `<div class="lineup-item ${p?'':'empty'}">
      <div class="pos-chip">${s.pos}</div>
      <div class="nm">${p?p.n:'—'}</div>
      <div class="tm">${p?p.teamShort:''}</div>
    </div>`;
  }).join('');
}
function updateStats(){
  const n = state.lineup.filter(Boolean).length;
  $('#stat-filled').textContent = n;
  $('#stat-rolls').textContent = state.rolls;
  $('#meter-fill').style.width = (n/11*100)+'%';
  $('#meter-pct').textContent = Math.round(n/11*100)+'%';
  $('#btn-sim').disabled = n!==11;
}

function rollDice(){
  state.rolls++;
  const dice = $('#dice');
  dice.classList.add('rolling');
  $('#btn-roll').disabled = true;
  $('#reveal').classList.remove('shown');
  $('#player-list').innerHTML='';
  const faces = ['⚀','⚁','⚂','⚃','⚄','⚅'];
  let t=0;
  const it = setInterval(()=>{
    dice.textContent = faces[Math.floor(Math.random()*6)];
    t++;
    if(t>14){
      clearInterval(it);
      dice.classList.remove('rolling');
      dice.textContent = faces[Math.floor(Math.random()*6)];
      const pool = state.tipo==='todos'?TIMES:TIMES.filter(x=>x.tipo===state.tipo);
      const team = pick(pool);
      state.currentTeam = team;
      $('#reveal-name').textContent = team.nome;
      $('#reveal-year').textContent = team.era;
      $('#reveal').classList.add('shown');
      renderRoster();
      $('#btn-roll').disabled=false;
      $('#btn-roll').textContent='ROLAR DE NOVO';
      updateStats();
    }
  },70);
}
function renderRoster(){
  const team = state.currentTeam;
  if(!team){$('#player-list').innerHTML='';return;}
  const isPro = state.mode==='pro';
  // posições já preenchidas
  const filledCount = pos => SLOTS.filter((s,i)=>s.pos===pos && state.lineup[i]).length;
  const maxPos = {GOL:1, DEF:4, MEI:3, ATA:3};
  const head = `<div class="roster-head">ELENCO · <b>${team.nome}</b> · clique no jogador pra mandar pro seu XI</div>`;
  $('#player-list').innerHTML = head + team.jogadores.map((p,i)=>{
    const cheia = filledCount(p.pos) >= maxPos[p.pos];
    // já está no XI?
    const jaNoXI = state.lineup.some(l=>l && l.n===p.n && l.team===team.nome);
    const locked = cheia || jaNoXI;
    const rating = isPro?'<span class="rt hidden">??</span>':`<div class="rt">${p.r}</div>`;
    return `<div class="pl ${locked?'locked':''}" data-i="${i}" title="${jaNoXI?'já está no XI':(cheia?'vaga de '+p.pos+' lotada':'')}">
      <div class="av">${p.pos==='GOL'?1:p.pos==='DEF'?'D':p.pos==='MEI'?'M':'A'}</div>
      <div class="info"><div class="nm">${p.n}</div><div class="mt">${team.nome}</div></div>
      <div class="pl-pos">${p.pos}</div>
      ${rating}
    </div>`;
  }).join('');
  $$('#player-list .pl').forEach(el=>{
    if(el.classList.contains('locked')) return;
    el.onclick = ()=>{
      const p = team.jogadores[+el.dataset.i];
      const slotIdx = SLOTS.findIndex((s,i)=>s.pos===p.pos && !state.lineup[i]);
      if(slotIdx<0){ toast('Posição '+p.pos+' já está lotada'); return; }
      state.lineup[slotIdx] = {...p, team:team.nome, teamShort:team.id.toUpperCase(), cores:team.cores};
      if(state.mode==='pro') toast(`${p.n} revelado · OVER ${p.r}`);
      else toast(`${p.n} entrou no XI`);
      renderPitch();
      renderRoster();
      if(state.lineup.filter(Boolean).length===11) toast('Escalação completa! Hora de simular ⚽');
    };
  });
}
$('#btn-roll').onclick = rollDice;

function toast(t){const el=document.createElement('div');el.className='toast';el.textContent=t;document.body.appendChild(el);setTimeout(()=>el.remove(),1800)}

$('#btn-reset').onclick = ()=>{
  if(state.lineup.filter(Boolean).length>0 && !confirm('Limpar toda a escalação?')) return;
  state.lineup = Array(11).fill(null); state.rolls=0; renderPitch();
};

$('#btn-sim').onclick = ()=>{
  $('#match').classList.add('open');
  $('#verdict').classList.remove('show','win','lose','draw');
  $('#feed').innerHTML='';
  $('#sc-a').textContent='0'; $('#sc-b').textContent='0'; $('#m-clock').textContent="00'";
  const foes = ['Alemanha 2014','Argentina 2022','Espanha 2010','França 1998','Itália 1982','Inglaterra 1966','Holanda 1974','Uruguai 1950'];
  const foe = pick(foes);
  $('#foe-name').textContent = foe.toUpperCase();
  $('#m-team-a').textContent = state.teamName.toUpperCase();
  const teamR = state.lineup.reduce((s,p)=>s+p.r,0)/11;
  const foeR = 78 + Math.random()*12;
  const ourChance  = Math.max(.05, ((teamR-foeR)/100)*0.35 + 0.18);
  const theirChance= Math.max(.04, ((foeR-teamR+8)/100)*0.30 + 0.07);
  let score=[0,0], minute=0;
  const scorers = state.lineup.filter(p=>p.pos==='ATA'||p.pos==='MEI');
  const w = scorers.map(p=>p.r);
  const tick = setInterval(()=>{
    minute++;
    $('#m-clock').textContent = String(minute).padStart(2,'0')+"'";
    if(Math.random()<ourChance/12){
      const sc = weighted(scorers,w);
      score[0]++; $('#sc-a').textContent=score[0];
      addEv(minute,`<strong>⚽ GOL!</strong> ${sc.n} (${sc.teamShort}) marca! ${score[0]}-${score[1]}`,'goal');
    }
    if(Math.random()<theirChance/12){
      score[1]++; $('#sc-b').textContent=score[1];
      addEv(minute,`<strong>Gol do adversário</strong> · ${score[0]}-${score[1]}`,'bad');
    }
    if(minute%18===0){
      addEv(minute, pick(['Pressão alta de '+pick(state.lineup).n+'.','Defesaça do goleiro!','Quase no contra-ataque.','Falta perigosa.','Posse rolando no meio.']));
    }
    if(minute>=90){
      clearInterval(tick);
      addEv(90,'<strong>FIM DE JOGO</strong>','goal');
      const v = $('#verdict'); v.classList.add('show');
      const d = score[0]-score[1];
      if(d>0){v.classList.add('win');$('#v-title').textContent='✅ VITÓRIA';$('#v-text').textContent=`Seu XI venceu por ${score[0]} a ${score[1]} contra ${foe}.`}
      else if(d===0){v.classList.add('draw');$('#v-title').textContent='🤝 EMPATE';$('#v-text').textContent=`${score[0]} a ${score[1]}. Bom jogo!`}
      else{v.classList.add('lose');$('#v-title').textContent='💔 DERROTA';$('#v-text').textContent=`${score[0]} a ${score[1]}. Troque peças e jogue de novo.`}
    }
  },110);
};
function weighted(items,weights){const t=weights.reduce((s,w)=>s+w,0);let r=Math.random()*t;for(let i=0;i<items.length;i++){r-=weights[i];if(r<=0)return items[i]}return items[0];}
function addEv(m,h,c=''){const f=$('#feed');const d=document.createElement('div');d.className='ev '+c;d.innerHTML=`<span class="mn">${String(m).padStart(2,'0')}'</span>${h}`;f.appendChild(d);f.scrollTop=f.scrollHeight;}
$('#btn-keep').onclick = ()=>$('#match').classList.remove('open');
$('#btn-new-match').onclick = ()=>{$('#btn-sim').click()};
$('#btn-restart').onclick = ()=>{state.lineup=Array(11).fill(null);state.rolls=0;renderPitch();$('#match').classList.remove('open')};

document.querySelector('#mode-seg').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('#mode-seg button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  state.mode = e.target.dataset.mode;
  toast('Modo: '+(state.mode==='pro'?'PRO (overs ocultos)':'CLÁSSICO'));
  renderRoster();
});
document.querySelector('#tipo-seg').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON') return;
  document.querySelectorAll('#tipo-seg button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  state.tipo = e.target.dataset.tipo;
  const labels = {todos:'Todos os times', selecao:'Seleções nacionais', brasileiro:'Times brasileiros'};
  toast('Filtro: '+labels[state.tipo]);
});
document.querySelector('#team-name').addEventListener('input',e=>{
  state.teamName = e.target.value.trim() || 'XI DOS SONHOS';
});

function isLight(hex){
  const c = hex.replace('#','');
  const r = parseInt(c.slice(0,2),16), g=parseInt(c.slice(2,4),16), b=parseInt(c.slice(4,6),16);
  return (r*0.299 + g*0.587 + b*0.114) > 170;
}
function hexToRgba(hex,a){
  const c = hex.replace('#','');
  const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
  return `rgba(${r},${g},${b},${a})`;
}

renderPitch();
</script>
</body>
